version: 2

semantic_models:
  - name: semantic_emea_sales_rev_agg
    description: >
      Semantic model for the EMEA sales revenue aggregate table, providing
      sales, revenue, rebate, and quantity metrics across customer, product,
      and sales organization hierarchies.
    model: ref('semantic_emea_sales_rev_agg')
    defaults:
      agg_time_dimension: invoice_date
    entities:
      - name: sales_rev_agg
        type: primary
        expr: sales_rev_agg_grain_id
      - name: customer
        type: foreign
        expr: customer_number
      - name: global_partner
        type: foreign
        expr: global_partner_number
      - name: limited_partner
        type: foreign
        expr: limited_partner_number
      - name: material_level_1
        type: foreign
        expr: material_level_1_number
      - name: material_level_2
        type: foreign
        expr: material_level_2_number
      - name: material_level_3
        type: foreign
        expr: material_level_3_number
      - name: material_level_4
        type: foreign
        expr: material_level_4_number
      - name: profit_center
        type: foreign
        expr: profit_center_number
      - name: sales_area
        type: foreign
        expr: sales_area_number
      - name: sales_division
        type: foreign
        expr: sales_division_number
      - name: sales_region
        type: foreign
        expr: sales_region_number
      - name: sales_rep
        type: foreign
        expr: sales_rep_number
      - name: sales_territory
        type: foreign
        expr: sales_territory_number
    dimensions:
      - name: invoice_date
        type: time
        type_params:
          time_granularity: day
      - name: area_group
        type: categorical
      - name: country_name
        type: categorical
      - name: customer_city
        type: categorical
      - name: customer_name
        type: categorical
      - name: division_name
        type: categorical
      - name: global_partner_name
        type: categorical
      - name: hub
        type: categorical
      - name: hub_one
        type: categorical
      - name: hub_two
        type: categorical
      - name: invoice_type
        type: categorical
      - name: item_category
        type: categorical
      - name: limited_partner_name
        type: categorical
      - name: material_level_1_name
        type: categorical
      - name: material_level_2_name
        type: categorical
      - name: material_level_3_name
        type: categorical
      - name: material_level_4_name
        type: categorical
      - name: order_reason
        type: categorical
      - name: order_type
        type: categorical
      - name: profit_center_name
        type: categorical
      - name: sales_area_manager
        type: categorical
      - name: sales_area_name
        type: categorical
      - name: sales_division_name
        type: categorical
      - name: sales_org
        type: categorical
      - name: sales_region_manager
        type: categorical
      - name: sales_region_name
        type: categorical
      - name: sales_rep_name
        type: categorical
      - name: sales_territory_name
        type: categorical
      - name: email_id_lower
        type: categorical
      - name: invoice_fiscal_period
        type: categorical
      - name: invoice_month
        type: categorical
      - name: invoice_quarter
        type: categorical
      - name: invoice_year
        type: categorical
      - name: business_day_in_month
        type: categorical
      - name: business_day_month_to_date_indicator
        type: categorical
      - name: business_day_quarter_to_date_indicator
        type: categorical
      - name: business_day_year_to_date_indicator
        type: categorical
      - name: business_days_ago
        type: categorical
      - name: last_business_day_indicator
        type: categorical
      - name: months_ago
        type: categorical
      - name: quarters_ago
        type: categorical
      - name: years_ago
        type: categorical
    measures:
      - name: quantity
        description: Total quantity sold.
        agg: sum
        expr: quantity
      - name: revenue
        description: Total revenue.
        agg: sum
        expr: revenue
      - name: sales
        description: Total sales amount.
        agg: sum
        expr: sales
      - name: rebate
        description: Total rebate amount.
        agg: sum
        expr: rebate

  - name: semantic_emea_support_cases_agg
    description: >
      Semantic model for the EMEA support cases aggregate table, providing
      case volume, escalation, SLA breach, warranty, and resolution time
      metrics across customer and product hierarchies.
    model: ref('semantic_emea_support_cases_agg')
    defaults:
      agg_time_dimension: invoice_month_date
    entities:
      - name: support_cases_agg
        type: primary
        expr: support_cases_agg_grain_id
      - name: customer
        type: foreign
        expr: customer_number
      - name: global_partner
        type: foreign
        expr: global_partner_number
      - name: material_level_2
        type: foreign
        expr: material_level_2_number
    dimensions:
      - name: customer_name
        type: categorical
      - name: global_partner_name
        type: categorical
      - name: material_level_2_name
        type: categorical
      - name: country_name
        type: categorical
      - name: hub
        type: categorical
      - name: case_type
        type: categorical
      - name: case_severity
        type: categorical
      - name: case_status
        type: categorical
      - name: invoice_year
        type: categorical
      - name: invoice_quarter
        type: categorical
      - name: invoice_month
        type: categorical
      - name: invoice_month_date
        type: time
        type_params:
          time_granularity: month
      - name: months_ago
        type: categorical
      - name: quarters_ago
        type: categorical
      - name: years_ago
        type: categorical
    measures:
      - name: case_count
        description: Total number of support cases.
        agg: sum
        expr: case_count
      - name: escalated_case_count
        description: Total number of escalated support cases.
        agg: sum
        expr: escalated_case_count
      - name: sla_breach_case_count
        description: Total number of SLA-breaching support cases.
        agg: sum
        expr: sla_breach_case_count
      - name: warranty_claim_count
        description: Total number of warranty claims.
        agg: sum
        expr: warranty_claim_count
      - name: warranty_cost
        description: Total warranty cost.
        agg: sum
        expr: warranty_cost
      - name: total_resolution_hours
        description: Total resolution hours across support cases.
        agg: sum
        expr: total_resolution_hours
