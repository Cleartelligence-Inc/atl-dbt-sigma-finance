version: 2

models:
  - name: int_customer
    description: "Customer dimension"
    semantic_model:
      enabled: true
      name: customers
    columns:
      - name: customerid
        entity:
          type: primary
          name: customer
        data_tests: [not_null, unique]

  - name: int_gl_account
    description: "GL Account dimension"
    semantic_model:
      enabled: true
      name: gl_accounts
    columns:
      - name: accountid
        entity:
          type: primary
          name: account
        data_tests: [not_null, unique]

  - name: int_customer_type
    description: "Customer Type"
    semantic_model:
      enabled: true
      name: customer_types
    columns:
      - name: customertypeid
        entity:
          type: primary
          name: customer_type
        data_tests: [not_null, unique]

  - name: int_product_hierarchy
    description: "Product hierarchy dimension conformed across ECC and S4 sources."
    columns:
      - name: hierarchyid
        description: "Hierarchy identifier used to map product categories to hierarchy levels."
        data_tests: [not_null, unique]
      - name: description
        description: "Hierarchy description."
      - name: level
        description: "Hierarchy level value."
      - name: source
        description: "System source that supplied the surviving hierarchy record."

  - name: int_transactions
    description: "Finance transaction fact table"
    columns:
      - name: transactionid
        data_tests: [not_null, unique]
      - name: accountid
        data_tests:
          - relationships:
              arguments:
                to: ref('int_gl_account')
                field: accountid
      - name: customerid
        data_tests:
          - relationships:
              arguments:
                to: ref('int_customer')
                field: customerid
      - name: version
        data_tests:
          - accepted_values:
              arguments:
                values: ['Actual', 'Forecast', 'Budget']
      - name: date
        data_tests: [not_null]

  - name: int_date
    description: "Calendar date dimension used as the MetricFlow daily time spine."
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        description: "Base daily date column for time-based joins and aggregations."
        granularity: day
      - name: date_id
        description: "Surrogate integer date key in YYYYMMDD format."
      - name: year
        description: "Calendar year."
      - name: quarter
        description: "Calendar quarter number."
      - name: month
        description: "Calendar month number."
      - name: month_number
        description: "Zero-padded calendar month number."
      - name: month_name
        description: "Short calendar month name."
      - name: week_of_year
        description: "Calendar week of year."
      - name: day_of_year
        description: "Calendar day of year."
      - name: day_of_month
        description: "Calendar day of month."
      - name: day_of_week_num
        description: "Numeric day of week where Sunday = 0."
      - name: day_name
        description: "Full day name."
      - name: day_type
        description: "Weekday or Weekend classification."
      - name: year_month
        description: "Calendar year-month in YYYY-MM format."
      - name: year_quarter
        description: "Calendar year-quarter in YYYY-Qn format."
